name: CI

# Minimal, path-filtered CI for the Lightning Git monorepo. A single `changes`
# job decides which packages a push/PR actually touched, and only those package
# jobs run. Each package builds, type-checks and tests on its own terms.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      extension: ${{ steps.filter.outputs.extension }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'
            extension:
              - 'extension/**'
              - '.github/workflows/ci.yml'

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      # the merge-prediction tests spin up throwaway git repos; give git an
      # identity so commits inside those temp repos succeed on a clean runner.
      - name: Configure git identity
        run: |
          git config --global user.email ci@lightning-git.local
          git config --global user.name "Lightning Git CI"
      - run: cargo test --locked

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build # vue-tsc type-check + vite build
      - run: npm test

  extension:
    needs: changes
    if: needs.changes.outputs.extension == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: extension/package-lock.json
      - run: npm ci
      - run: npm run compile
      - run: npm run lint
      - run: npm test
